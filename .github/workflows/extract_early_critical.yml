name: Extract early critical GSMG contexts

on:
  push:
    paths:
      - '.github/workflows/extract_early_critical.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract exact early critical contexts
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 \
            'https://raw.githubusercontent.com/halbgott29a/gsmgio-5btc-puzzle/master/_work/chat_transcript.txt' \
            --output /tmp/chat_transcript.txt
          python3 - <<'PY'
          import re
          from pathlib import Path
          raw=Path('/tmp/chat_transcript.txt').read_text(encoding='utf-8',errors='replace')
          pat=re.compile(r'^=== \[(?P<date>[^\]]+)\] (?P<sender>[^\n]*)\n(?P<text>.*?)(?=^=== \[|\Z)',re.M|re.S)
          msgs=[{'index':i,'date':m.group('date').strip(),'sender':m.group('sender').strip(),'text':m.group('text').strip()} for i,m in enumerate(pat.finditer(raw))]
          targets=[
            'Roses are White but often Red.',
            "Let's see what bitcoin is worth the next halving",
            'answer is there',
            'Really nobody managed to find the extra door',
            'Indeed remarkable with the hints stating the path pretty obvious',
            'You are at the prime part already???',
            'another door might be found on {1 },{4} ,{21}',
            'Oh well, why not. A mini mini hint. Ready',
            'The previous "there is another door hint" is still a thing',
            'Breaking salphation, should be giving the feeling of the phase',
          ]
          lines=[]
          for target in targets:
              hits=[i for i,m in enumerate(msgs) if target.lower() in m['text'].lower() and m['sender']=='Jrk Bgrt']
              lines.append('######## '+target)
              if not hits:
                  lines.append('NOT FOUND\n'); continue
              for i in hits:
                  lo=max(0,i-10); hi=min(len(msgs),i+11)
                  lines.append(f'INDEX {i}\n')
                  for x in msgs[lo:hi]:
                      mark='>>>' if x['index']==i else '   '
                      lines.append(f'{mark} [{x["date"]}] {x["sender"]}\n{x["text"]}\n')
          out=Path('gsmg_early_context'); out.mkdir(exist_ok=True)
          (out/'EARLY_CRITICAL_CONTEXTS.txt').write_text('\n'.join(lines),encoding='utf-8')
          PY
      - name: Commit exact contexts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gsmg_early_context/EARLY_CRITICAL_CONTEXTS.txt
          git commit -m 'Extract critical early GSMG contexts'
          git push
