name: Cleanup GSMG full audit

on:
  push:
    paths:
      - '.github/workflows/cleanup_gsmg_full_audit.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove temporary public audit material
        run: |
          set -euo pipefail
          rm -rf gsmg_full_message_audit
          rm -rf gsmg_quoted_creator_audit
          rm -rf gsmg_final_targeted_audit
          rm -f .github/workflows/full_gsmg_message_audit.yml
          rm -f .github/workflows/audit_gsmg_quoted_creator_artifacts.yml
          rm -f .github/workflows/final_gsmg_targeted_audit.yml
          rm -f .github/workflows/cleanup_gsmg_full_audit.yml
      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove temporary GSMG full-audit material'
          git push
