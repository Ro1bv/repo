name: Extract GSMG reply targets

on:
  push:
    paths:
      - '.github/workflows/extract_gsmg_reply_targets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract compact chronological contexts
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 \
            'https://raw.githubusercontent.com/halbgott29a/gsmgio-5btc-puzzle/master/_work/chat_transcript.txt' \
            --output /tmp/chat_transcript.txt
          python3 - <<'PY'
          import json, re
          from pathlib import Path

          raw=Path('/tmp/chat_transcript.txt').read_text(encoding='utf-8',errors='replace')
          pat=re.compile(r'^=== \[(?P<date>[^\]]+)\] (?P<sender>[^\n]*)\n(?P<text>.*?)(?=^=== \[|\Z)',re.M|re.S)
          msgs=[{'index':i,'date':m.group('date').strip(),'sender':m.group('sender').strip(),'text':m.group('text').strip()} for i,m in enumerate(pat.finditer(raw))]
          targets=[
            "Ok ok ok ok. I can't hold this one any longer.",
            'Are you really looking for just the btc...?',
            'Another one only 8 minutes after the last one?',
            'Might be. Wish I had said nothing though.',
            'Exactly, should have refrained from typing earlier maybe.',
            'I saw that you guys got really really far already.',
            'Actually, the hardest part is done.',
            'Globally supporting my generation',
            'I wish only for that the puzzle provided some exciting pieces of information.',
            'In the eye of the beholder, for sure',
            'Technically my friends and family can get to all my data',
            'Once you hit a "ying yang", you\'ll be able to solve it the same day.',
            'Both?',
            'No need. You have all the info.',
            'No hints',
            'My hat off to you, and you know why',
            'Only fair ones. And to everyone.',
            'Something was solved rather... remarkable.',
            'Partly.',
            "I won't!",
          ]
          result=[]
          for target in targets:
            hits=[i for i,m in enumerate(msgs) if target.lower() in m['text'].lower()]
            item={'target':target,'hits':[]}
            for i in hits:
              if msgs[i]['date'].startswith(('03.08.2023','04.08.2023','06.08.2023')):
                item['hits'].append({'message':msgs[i], 'before':msgs[max(0,i-5):i], 'after':msgs[i+1:min(len(msgs),i+6)]})
            result.append(item)
          out=Path('gsmg_context'); out.mkdir(exist_ok=True)
          (out/'REPLY_TARGET_CONTEXTS.json').write_text(json.dumps(result,indent=2,ensure_ascii=False),encoding='utf-8')
          lines=[]
          for item in result:
            lines.append('##### '+item['target'])
            if not item['hits']:
              lines.append('NO AUGUST 2023 HIT\n')
              continue
            for hit in item['hits']:
              lines.append('\n-- BEFORE --')
              for m in hit['before']:
                lines.append(f"[{m['date']}] {m['sender']}: {m['text']}")
              m=hit['message']; lines.append('\n-- TARGET --'); lines.append(f"[{m['date']}] {m['sender']}: {m['text']}")
              lines.append('\n-- AFTER --')
              for m in hit['after']:
                lines.append(f"[{m['date']}] {m['sender']}: {m['text']}")
              lines.append('')
          (out/'REPLY_TARGET_CONTEXTS.txt').write_text('\n'.join(lines),encoding='utf-8')
          PY
      - name: Commit compact contexts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gsmg_context/REPLY_TARGET_CONTEXTS.*
          git commit -m 'Extract compact GSMG creator reply contexts'
          git push
