name: Final GSMG targeted audit

on:
  push:
    paths:
      - '.github/workflows/final_gsmg_targeted_audit.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and decode targeted creator messages
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 \
            'https://raw.githubusercontent.com/halbgott29a/gsmgio-5btc-puzzle/master/_work/chat_transcript.txt' \
            --output /tmp/chat_transcript.txt
          python3 - <<'PY'
          import json,re
          from pathlib import Path
          raw=Path('/tmp/chat_transcript.txt').read_text(encoding='utf-8',errors='replace')
          pat=re.compile(r'^=== \[(?P<date>[^\]]+)\] (?P<sender>[^\n]*)\n(?P<text>.*?)(?=^=== \[|\Z)',re.M|re.S)
          msgs=[{'index':i,'date':m.group('date').strip(),'sender':m.group('sender').strip(),'text':m.group('text').strip()} for i,m in enumerate(pat.finditer(raw))]
          out=Path('gsmg_final_targeted_audit'); out.mkdir(exist_ok=True)

          # Exact targeted global indices, with wider context.
          targets=[
            6142,6146,6157,6159,6179,6180,6181,6183,6204,6262,
            13998,15606,17852,18932,25284,25348,25354,25366,
            30791,30804,30817,30821,38731,38732,
            42080,42081,42082,42083,42084,42085,
            47637,47657,47660,47662,47666,47672,47674
          ]
          lines=[]
          for idx in targets:
              if idx>=len(msgs): continue
              m=msgs[idx]
              lines.append(f'######## GLOBAL={idx} [{m["date"]}] {m["sender"]}\nTARGET: {m["text"]}\n')
              for x in msgs[max(0,idx-12):min(len(msgs),idx+13)]:
                  mark='>>>' if x['index']==idx else '   '
                  lines.append(f'{mark} GLOBAL={x["index"]} [{x["date"]}] {x["sender"]}\n{x["text"]}\n')
          (out/'TARGET_CONTEXTS.txt').write_text('\n'.join(lines),encoding='utf-8')

          # Decode all creator messages that consist of space-separated 8-bit bytes.
          decoded=[]
          for m in msgs:
              if m['sender']!='Jrk Bgrt': continue
              toks=m['text'].split()
              if not toks or not all(re.fullmatch(r'[01]{8}',t) for t in toks): continue
              normal=bytes(int(t,2) for t in toks)
              revbits=bytes(int(t[::-1],2) for t in toks)
              decoded.append({
                'global_index':m['index'],'date':m['date'],'byte_count':len(toks),
                'normal_utf8':normal.decode('utf-8','replace'),
                'reverse_each_byte_utf8':revbits.decode('utf-8','replace')
              })
          (out/'DECODED_CREATOR_BINARY.json').write_text(json.dumps(decoded,indent=2,ensure_ascii=False),encoding='utf-8')
          PY
      - name: Commit targeted audit
        run: |
          git config user.name 'github-actions[bot]]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gsmg_final_targeted_audit
          git commit -m 'Complete targeted GSMG message audit'
          git push
