name: Fetch DBBI diagrams
on:
  push:
    paths:
      - '.github/workflows/fetch_dbbi_diagrams.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p diagrams
          curl -L --fail https://raw.githubusercontent.com/CoruNethron/salph-cosmic-final-solution/main/assets/dbbi-part-1.png -o diagrams/dbbi-part-1.png
          curl -L --fail https://raw.githubusercontent.com/CoruNethron/salph-cosmic-final-solution/main/assets/dbbi-part-2.png -o diagrams/dbbi-part-2.png
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagrams
          git commit -m 'Fetch DBBI diagrams for audit'
          git push
