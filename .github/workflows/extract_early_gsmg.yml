name: Extract early GSMG creator context

on:
  push:
    paths:
      - '.github/workflows/extract_early_gsmg.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download transcript and extract early creator context
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 \
            'https://raw.githubusercontent.com/halbgott29a/gsmgio-5btc-puzzle/master/_work/chat_transcript.txt' \
            --output /tmp/chat_transcript.txt
          python3 - <<'PY'
          import json, re
          from datetime import datetime
          from pathlib import Path

          raw = Path('/tmp/chat_transcript.txt').read_text(encoding='utf-8', errors='replace')
          pat = re.compile(r'^=== \[(?P<date>[^\]]+)\] (?P<sender>[^\n]*)\n(?P<text>.*?)(?=^=== \[|\Z)', re.M|re.S)
          msgs=[]
          for i,m in enumerate(pat.finditer(raw)):
              d=m.group('date').strip()
              try: dt=datetime.strptime(d,'%d.%m.%Y %H:%M:%S UTC-05:00')
              except ValueError: dt=None
              msgs.append({'index':i,'date':d,'datetime':dt,'sender':m.group('sender').strip(),'text':m.group('text').strip()})

          creator=[m for m in msgs if m['sender']=='Jrk Bgrt']
          early=[m for m in creator if m['datetime'] and m['datetime'] < datetime(2023,1,1)]
          first80=creator[:80]
          keywords=['rabbit','bunny','matrix','key','btc','answer','source','prime','door','password','salph','dbbi','faed','yin','yang','cosmic','phase','stage','image','code','hint']
          keyword_hits=[]
          for m in early:
              low=m['text'].lower()
              hits=[k for k in keywords if k in low]
              if hits:
                  keyword_hits.append((m,hits))

          def render_context(m, radius=5):
              i=m['index']; lo=max(0,i-radius); hi=min(len(msgs),i+radius+1)
              lines=[f'##### CREATOR INDEX {i} [{m["date"]}]\n']
              for x in msgs[lo:hi]:
                  marker='>>>' if x['index']==i else '   '
                  lines.append(f'{marker} [{x["date"]}] {x["sender"]}\n{x["text"]}\n')
              return '\n'.join(lines)

          out=Path('gsmg_early_context'); out.mkdir(exist_ok=True)
          (out/'FIRST_80_JRK_CONTEXT.txt').write_text('\n\n'.join(render_context(m,4) for m in first80),encoding='utf-8')
          (out/'PRE2023_KEYWORD_JRK_CONTEXT.txt').write_text('\n\n'.join(
              f'KEYWORDS: {", ".join(h)}\n'+render_context(m,6) for m,h in keyword_hits
          ),encoding='utf-8')
          summary={
              'total_messages':len(msgs),
              'creator_messages':len(creator),
              'pre2023_creator_messages':len(early),
              'first80_first':first80[0]['date'] if first80 else None,
              'first80_last':first80[-1]['date'] if first80 else None,
              'keyword_hit_count':len(keyword_hits),
              'keyword_hits':[{'index':m['index'],'date':m['date'],'text':m['text'],'keywords':h} for m,h in keyword_hits]
          }
          (out/'SUMMARY.json').write_text(json.dumps(summary,indent=2,ensure_ascii=False),encoding='utf-8')
          PY
      - name: Commit extracted early context
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gsmg_early_context
          git commit -m 'Extract early GSMG creator context'
          git push
